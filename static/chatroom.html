<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loot Hunters' Lodge</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0f;
    color: #e0ddd8;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 14px;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  .header {
    padding: 16px 20px;
    border-bottom: 1px solid #2a2a3a;
    background: #12121a;
  }
  .header h1 {
    color: #d4a044;
    font-size: 18px;
    font-weight: 700;
  }
  .header p {
    color: #8a8898;
    font-size: 12px;
    margin-top: 4px;
  }

  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
  }

  .msg {
    margin-bottom: 12px;
    padding: 10px 14px;
    background: #12121a;
    border: 1px solid #2a2a3a;
    border-radius: 8px;
  }
  .msg-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 4px;
  }
  .msg-name {
    color: #d4a044;
    font-weight: 600;
    font-size: 13px;
  }
  .msg-addr {
    color: #484f58;
    font-size: 10px;
    font-family: monospace;
  }
  .msg-time {
    color: #484f58;
    font-size: 10px;
    margin-left: auto;
  }
  .msg-text {
    color: #e0ddd8;
    font-size: 14px;
    line-height: 1.5;
    word-wrap: break-word;
    overflow-wrap: break-word;
    white-space: pre-wrap;
  }

  .input-bar {
    display: flex;
    gap: 8px;
    padding: 12px 16px;
    border-top: 1px solid #2a2a3a;
    background: #12121a;
  }
  .input-bar input[type="text"] {
    flex: 1;
    background: #0a0a0f;
    border: 1px solid #2a2a3a;
    border-radius: 6px;
    padding: 10px 14px;
    color: #e0ddd8;
    font-size: 14px;
    font-family: inherit;
    outline: none;
  }
  .input-bar input:focus { border-color: #d4a044; }
  .input-bar input::placeholder { color: #484f58; }
  .input-bar button {
    background: #d4a044;
    border: none;
    border-radius: 6px;
    color: #0a0a0f;
    padding: 10px 20px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
  }
  .input-bar button:hover { background: #e0b050; }
  .input-bar button:disabled { opacity: 0.5; cursor: default; }

  .name-bar {
    display: flex;
    gap: 8px;
    padding: 8px 16px;
    background: #12121a;
    align-items: center;
  }
  .name-bar label {
    color: #8a8898;
    font-size: 12px;
    white-space: nowrap;
  }
  .name-bar input {
    background: #0a0a0f;
    border: 1px solid #2a2a3a;
    border-radius: 4px;
    padding: 5px 10px;
    color: #d4a044;
    font-size: 12px;
    font-family: inherit;
    outline: none;
    width: 150px;
  }
  .name-bar input:focus { border-color: #d4a044; }
  .name-bar .online {
    margin-left: auto;
    color: #4ade80;
    font-size: 11px;
  }

  .empty {
    text-align: center;
    color: #484f58;
    padding: 60px 20px;
    font-style: italic;
  }
</style>
</head>
<body>

<div class="header">
  <h1>Loot Hunters' Lodge</h1>
  <p>Where gossip is traded and hints are dropped. Be cryptic. Be generous. Trust no one.</p>
</div>

<div class="name-bar">
  <label>Your name:</label>
  <input type="text" id="name-input" placeholder="Anonymous" value="">
  <span class="online" id="msg-count"></span>
</div>

<div class="messages" id="messages">
  <div class="empty">The lodge is quiet. Be the first to speak.</div>
</div>

<div class="input-bar">
  <input type="text" id="msg-input" placeholder="Drop a hint, share a find, call out a liar..." autofocus>
  <button id="send-btn" onclick="sendMessage()">Send</button>
</div>

<script>
const HOST = window.location.origin;
let lastTs = 0;
let polling = null;

// Try to load name from game identity
async function loadIdentity() {
  try {
    const resp = await fetch(HOST + '/api/game/status');
    const data = await resp.json();
    if (data.identity) {
      const nameInput = document.getElementById('name-input');
      if (data.identity.display_name && !nameInput.value) {
        nameInput.value = data.identity.display_name;
      }
      window._gameAddress = data.identity.rns_address || '';
    }
  } catch (e) {}
}

function escapeHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function formatTime(isoStr) {
  try {
    const d = new Date(isoStr);
    return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  } catch { return ''; }
}

function renderMessages(msgs) {
  const container = document.getElementById('messages');
  if (msgs.length === 0 && container.querySelector('.empty')) return;
  if (msgs.length === 0) {
    container.innerHTML = '<div class="empty">The lodge is quiet. Be the first to speak.</div>';
    return;
  }

  // Remove empty message if present
  const empty = container.querySelector('.empty');
  if (empty) empty.remove();

  for (const msg of msgs) {
    const el = document.createElement('div');
    el.className = 'msg';
    el.innerHTML = `
      <div class="msg-header">
        <span class="msg-name">${escapeHtml(msg.name)}</span>
        <span class="msg-addr">${escapeHtml((msg.address || '').slice(0, 12))}...</span>
        <span class="msg-time">${formatTime(msg.time)}</span>
      </div>
      <div class="msg-text">${escapeHtml(msg.text)}</div>
    `;
    container.appendChild(el);
    if (msg.ts > lastTs) lastTs = msg.ts;
  }
  container.scrollTop = container.scrollHeight;
}

async function fetchMessages(since) {
  try {
    const url = since ? `${HOST}/api/chatroom/messages?since=${since}` : `${HOST}/api/chatroom/messages`;
    const resp = await fetch(url);
    const msgs = await resp.json();
    if (msgs.length > 0) renderMessages(msgs);
    // Update count
    const infoResp = await fetch(HOST + '/api/chatroom/info');
    const info = await infoResp.json();
    document.getElementById('msg-count').textContent = info.message_count + ' messages';
  } catch (e) {
    console.error('Fetch error:', e);
  }
}

async function sendMessage() {
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (!text) return;
  const name = document.getElementById('name-input').value.trim() || 'Anonymous';
  const btn = document.getElementById('send-btn');

  btn.disabled = true;
  input.value = '';

  try {
    await fetch(HOST + '/api/chatroom/post', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        name: name,
        text: text,
        address: window._gameAddress || 'unknown',
      }),
    });
    await fetchMessages(lastTs);
  } catch (e) {
    console.error('Send error:', e);
  }

  btn.disabled = false;
  input.focus();
}

document.getElementById('msg-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') sendMessage();
});

// Init
loadIdentity();
fetchMessages(0);
polling = setInterval(() => fetchMessages(lastTs), 3000);
</script>

</body>
</html>
